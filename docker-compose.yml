version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: PROYECTO/BLOQUE_3/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - PROYECTO/BLOQUE_3/backend/.env
    volumes:
      - ./DATOS:/app/DATOS
      - ./PROYECTO/BLOQUE_3/backend:/app/PROYECTO/BLOQUE_3/backend

  web:
    build:
      context: .
      dockerfile: PROYECTO/BLOQUE_2/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
